<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교사 열람 페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5f6f4; --panel:#ffffff; --ink:#1c2321; --line:#e3e5e0; --muted:#6b7280;
  --teal:#0f6b64; --teal-soft:rgba(15,107,100,.10); --teal-line:rgba(15,107,100,.35);
  --amber:#b8760a; --amber-soft:rgba(184,118,10,.10);
  --coral:#b0413e; --coral-soft:rgba(176,65,62,.10);
  --sans:'Noto Sans KR',sans-serif; --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;}

header{background:linear-gradient(135deg,#0f6b64,#134e4a);color:#fff;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
header h1{font-size:19px;font-weight:800;letter-spacing:-.2px;}
header .hsub{font-size:12px;opacity:.75;font-family:var(--mono);margin-top:2px;}
.role-badge{display:inline-block;font-size:11px;font-family:var(--mono);font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.18);margin-left:8px;vertical-align:middle;}
#refreshBtn,#logoutBtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:#fff;padding:9px 16px;border-radius:9px;font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer;margin-left:8px;}
#refreshBtn:hover,#logoutBtn:hover{background:rgba(255,255,255,.24);}
#lastUpdated{font-size:11px;opacity:.7;font-family:var(--mono);margin-top:6px;text-align:right;}

main{max-width:1100px;margin:0 auto;padding:24px 20px 70px;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px;}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,var(--teal) 0 6px,transparent 6px 9px);}
.kpi-label{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.5px;margin-bottom:8px;}
.kpi-value{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--ink);}
.kpi-unit{font-size:12px;color:var(--muted);margin-left:3px;}

.tab-row{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.tab-btn{background:none;border:none;padding:10px 18px;font-family:var(--sans);font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
.tab-btn:hover:not(.active){color:var(--ink);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.section-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:20px;}
.section-title{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);}

.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:grid;grid-template-columns:140px 1fr 56px;align-items:center;gap:10px;}
.bar-name{font-size:12.5px;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{background:#eef0ee;border-radius:5px;height:20px;position:relative;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;background:repeating-linear-gradient(90deg,var(--teal) 0 10px,#137a72 10px 12px);transition:width .5s ease;}
.bar-fill.amber{background:repeating-linear-gradient(90deg,var(--amber) 0 10px,#a06709 10px 12px);}
.bar-val{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right;}

table.data-tbl{width:100%;border-collapse:collapse;font-size:13px;}
table.data-tbl th{text-align:left;font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.4px;text-transform:uppercase;padding:8px 10px;border-bottom:2px solid var(--line);}
table.data-tbl td{padding:10px 10px;border-bottom:1px solid var(--line);color:var(--ink);}
table.data-tbl tbody tr:hover{background:#fafbfa;}
tr.expand-row{cursor:pointer;}
tr.expand-row:hover{background:var(--teal-soft)!important;}
.expand-arrow{color:var(--teal);font-size:11px;width:18px;text-align:center;}
tr.expand-panel-row td{padding:0!important;border-bottom:1px solid var(--line);}
tr.expand-panel-row.hidden{display:none;}
.expand-panel{background:#fafbfa;padding:14px 18px 16px 44px;border-top:1px dashed var(--line);}
.expand-panel-title{font-size:11.5px;font-weight:700;color:var(--teal);font-family:var(--mono);margin-bottom:10px;letter-spacing:.3px;}
table.inner-tbl{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
table.inner-tbl th{font-size:10.5px;padding:7px 10px;}
table.inner-tbl td{padding:8px 10px;font-size:12.5px;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--mono);}
.badge.good{background:var(--teal-soft);color:var(--teal);}
.badge.mid{background:var(--amber-soft);color:var(--amber);}
.badge.low{background:var(--coral-soft);color:var(--coral);}

.search-wrap{margin-bottom:16px;}
#studentSearch{width:100%;max-width:320px;padding:9px 14px;border:1.5px solid var(--line);border-radius:9px;font-family:var(--sans);font-size:13px;outline:none;}
#studentSearch:focus{border-color:var(--teal);}

.empty-note{color:var(--muted);font-size:13px;text-align:center;padding:30px 0;}
.loading-note{color:var(--muted);font-size:13px;text-align:center;padding:60px 0;font-family:var(--mono);}
footer.dev-footer{text-align:center;font-size:11px;color:var(--muted);font-family:var(--mono);padding:20px 0 40px;}

/* 로그인 화면 */
#loginGate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:36px 32px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.06);}
.login-box h2{font-size:18px;font-weight:800;margin-bottom:6px;}
.login-box .sub{font-size:12.5px;color:var(--muted);margin-bottom:22px;}
.login-field{margin-bottom:12px;}
.login-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.login-field input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:13.5px;outline:none;}
.login-field input:focus{border-color:var(--teal);}
.login-btn{width:100%;padding:11px;border-radius:9px;border:none;background:var(--teal);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;margin-top:6px;}
.login-btn:hover{opacity:.9;}
.login-btn.ghost{background:#eef0ee;color:var(--ink);margin-top:8px;}
.login-msg{font-size:12.5px;border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.login-msg.error{background:var(--coral-soft);color:var(--coral);}
.login-msg.info{background:var(--teal-soft);color:var(--teal);}
.login-msg.wait{background:var(--amber-soft);color:var(--amber);}
</style>
</head>
<body>

<!-- ══════════ 로그인 게이트 ══════════ -->
<div id="loginGate">
  <div class="login-box">
    <h2>🧑‍🏫 교사 열람 페이지</h2>
    <div class="sub">관리자에게 승인받은 학급/활동 자료만 조회할 수 있습니다.</div>
    <div id="teacherLoginMsg"></div>
    <div class="login-field">
      <label>이름</label>
      <input type="text" id="teacherNameInput" placeholder="예: 김민지">
    </div>
    <div class="login-field">
      <label>접속코드 (본인이 정하는 4자리 이상 코드)</label>
      <input type="password" id="teacherPinInput" placeholder="숫자/영문 조합" onkeydown="if(event.key==='Enter')teacherLoginAttempt()">
    </div>
    <button class="login-btn" onclick="teacherLoginAttempt()">로그인 / 승인 확인</button>
    <button class="login-btn ghost" onclick="teacherRequestAttempt()">처음이에요, 권한 신청하기</button>
  </div>
</div>

<!-- ══════════ 실제 열람 화면 ══════════ -->
<div id="appRoot" style="display:none;">
<header>
  <div>
    <h1>🧑‍🏫 교사 열람 페이지<span class="role-badge" id="roleBadge"></span></h1>
    <div class="hsub">권한 받은 학급 · 활동 자료만 표시됩니다</div>
  </div>
  <div>
    <button id="refreshBtn" onclick="loadDashboard()">↻ 새로고침</button>
    <button id="logoutBtn" onclick="logoutView()">로그아웃</button>
    <div id="lastUpdated"></div>
  </div>
</header>

<main>
  <div id="loadingNote" class="loading-note">데이터를 불러오는 중입니다...</div>

  <div id="dashboardContent" style="display:none;">
    <div class="kpi-row" id="kpiRow"></div>

    <div class="tab-row" id="tabRow">
      <button class="tab-btn active" data-tab="overall" onclick="switchTab('overall')">📊 전체</button>
      <button class="tab-btn" data-tab="class" onclick="switchTab('class')">🏫 반별</button>
      <button class="tab-btn" data-tab="student" onclick="switchTab('student')">🧑‍🎓 학생별</button>
      <button class="tab-btn" data-tab="mitosis" id="mitosisTabBtn" style="display:none;" onclick="switchTab('mitosis')">🔬 체세포분열 관찰</button>
    </div>

    <div class="tab-panel active" id="tab-overall">
      <div class="section-card">
        <div class="section-title"><span class="dot"></span>활동별 제출 인원</div>
        <div class="bar-chart" id="activityBars"></div>
      </div>
      <div class="section-card">
        <div class="section-title"><span class="dot"></span>활동별 상세</div>
        <div style="overflow-x:auto;"><table class="data-tbl" id="activityTable"></table></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-class">
      <div class="section-card">
        <div class="section-title"><span class="dot"></span>반별 평균 서술 달성도</div>
        <div class="bar-chart" id="classDescBars"></div>
      </div>
      <div class="section-card">
        <div class="section-title"><span class="dot"></span>반별 평균 만족도</div>
        <div class="bar-chart" id="classSatBars"></div>
      </div>
      <div class="section-card">
        <div class="section-title"><span class="dot"></span>반별 상세</div>
        <div style="overflow-x:auto;"><table class="data-tbl" id="classTable"></table></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-student">
      <div class="section-card">
        <div class="section-title"><span class="dot"></span>학생별 참여 현황</div>
        <div class="search-wrap"><input type="text" id="studentSearch" placeholder="이름 또는 반으로 검색..." oninput="renderStudentTable()"></div>
        <div style="overflow-x:auto;"><table class="data-tbl" id="studentTable"></table></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-mitosis">
      <div class="section-card" style="padding:18px 20px;">
        <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
          <input id="filter-text" type="text" placeholder="이름 검색" style="padding:8px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;" oninput="renderMitosisRows()">
          <select id="filter-class" style="padding:8px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;" onchange="renderMitosisRows()">
            <option value="">전체 반</option>
          </select>
          <span id="mitosis-count-label" style="font-size:13px;color:var(--muted);margin-left:auto;"></span>
        </div>
      </div>
      <div id="mitosis-status" style="color:var(--muted);font-size:13px;margin-bottom:14px;"></div>
      <div id="mitosis-rows-container"></div>
    </div>
  </div>
</main>

<footer class="dev-footer">개발자: kimmie kim</footer>
</div><!-- /#appRoot -->

<script>
// ⚙️ 기존 학생 데이터용 Apps Script 웹앱 URL (관리자 대시보드와 동일한 값을 넣어주세요 — 읽기 전용으로만 사용합니다)
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzDH4Pqd0g5yEuLTT8CaEPUKhP4uuWqHFfhq6TXwaaogHonYO57eHsLefFo_lo4rJXj8Q/exec";

// ⚙️ 교사 권한 전용(별도) Apps Script 웹앱 URL — 관리자 대시보드의 TEACHER_GAS_URL과 동일한 값을 넣어주세요
const TEACHER_GAS_URL = "https://script.google.com/macros/s/AKfycbxTvXKsjjx1SecWC4-GOVGlfceG5akN80QLczy51kpGS_49H8IPtzVp0oua0iuxKwFb/exec";

// 체세포분열 관찰 탭의 실제 활동명(활동별 데이터의 '활동명'과 정확히 일치해야 합니다)
const MITOSIS_ACTIVITY_NAME = "체세포분열 관찰";

let dashboardData = null;
let teacherIdentity = null;
let teacherPermissions = [];
let mitosisAllRows = [];

function scoreBadge(pct){
  if(pct==null) return '<span class="badge mid">-</span>';
  const cls = pct>=80?'good':pct>=50?'mid':'low';
  return `<span class="badge ${cls}">${pct}%</span>`;
}
function satBadge(v){
  if(v==null) return '<span class="badge mid">-</span>';
  const cls = v>=4?'good':v>=3?'mid':'low';
  return `<span class="badge ${cls}">${v}/5</span>`;
}
function nzText(v){ return (v===null||v===undefined||v==='')?'-':v; }

function fetchViaJsonp(url){
  return new Promise((resolve, reject)=>{
    const cbName='gasCallback_'+Date.now()+'_'+Math.floor(Math.random()*10000);
    const timer=setTimeout(()=>{ cleanup(); reject(new Error('요청 시간이 초과되었습니다. (15초)')); }, 15000);
    function cleanup(){ clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); }
    window[cbName]=function(json){ cleanup(); resolve(json); };
    const sep=url.indexOf('?')>=0?'&':'?';
    const script=document.createElement('script');
    script.src=url+sep+'callback='+cbName+'&_ts='+Date.now();
    script.onerror=()=>{ cleanup(); reject(new Error('스크립트를 불러오지 못했습니다.')); };
    document.body.appendChild(script);
  });
}

async function fetchJson(url){
  try{
    const res = await fetch(url, {method:'GET'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  }catch(err){
    return await fetchViaJsonp(url);
  }
}

// ══════════════════════════════════════════════════════════
// 🔐 로그인
// ══════════════════════════════════════════════════════════
function loginMsg(type, text){
  document.getElementById('teacherLoginMsg').innerHTML = text ? `<div class="login-msg ${type}">${text}</div>` : '';
}

async function teacherLoginAttempt(){
  if(!TEACHER_GAS_URL){ loginMsg('error','TEACHER_GAS_URL이 아직 설정되지 않았습니다. 관리자에게 문의해주세요.'); return; }
  const name = document.getElementById('teacherNameInput').value.trim();
  const pin = document.getElementById('teacherPinInput').value.trim();
  if(!name || !pin){ loginMsg('error','이름과 접속코드를 모두 입력해주세요.'); return; }
  loginMsg('info','확인 중입니다...');
  try{
    const json = await fetchJson(`${TEACHER_GAS_URL}?action=teacherLogin&name=${encodeURIComponent(name)}&pin=${encodeURIComponent(pin)}`);
    if(json.result === 'notfound'){
      loginMsg('error','신청 내역이 없습니다. 아래 "권한 신청하기"를 먼저 진행해주세요.');
      return;
    }
    if(json.result === 'pending' || (json.result==='ok' && (!json.permissions || json.permissions.length===0))){
      loginMsg('wait','관리자 승인 대기 중입니다. 승인 후 다시 로그인해주세요.');
      return;
    }
    if(json.result === 'ok'){
      teacherIdentity = {name, pin};
      teacherPermissions = json.permissions || [];
      localStorage.setItem('tv_name', name);
      localStorage.setItem('tv_pin', pin);
      enterView();
      return;
    }
    loginMsg('error','처리 중 오류: '+(json.message||''));
  }catch(err){
    loginMsg('error','서버 연결에 실패했습니다: '+err.message);
  }
}

async function teacherRequestAttempt(){
  if(!TEACHER_GAS_URL){ loginMsg('error','TEACHER_GAS_URL이 아직 설정되지 않았습니다. 관리자에게 문의해주세요.'); return; }
  const name = document.getElementById('teacherNameInput').value.trim();
  const pin = document.getElementById('teacherPinInput').value.trim();
  if(!name || !pin){ loginMsg('error','이름과 접속코드를 모두 입력해주세요.'); return; }
  if(pin.length < 4){ loginMsg('error','접속코드는 4자리 이상으로 만들어주세요.'); return; }
  loginMsg('info','신청 중입니다...');
  try{
    const res = await fetch(TEACHER_GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'teacherRequestAccess', name, pin})
    });
    const json = await res.json();
    if(json.result === 'ok'){
      loginMsg('wait','신청이 접수되었습니다. 관리자가 학급을 지정해줄 때까지 기다려주세요.');
    } else {
      loginMsg('error','신청 실패: '+(json.message||''));
    }
  }catch(err){
    loginMsg('error','서버 연결에 실패했습니다: '+err.message);
  }
}

function logoutView(){
  localStorage.removeItem('tv_name');
  localStorage.removeItem('tv_pin');
  location.reload();
}

function enterView(){
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('roleBadge').textContent = teacherIdentity.name;
  loadDashboard();
}

(function tryAutoLogin(){
  const name = localStorage.getItem('tv_name');
  const pin = localStorage.getItem('tv_pin');
  if(name && pin){
    document.getElementById('teacherNameInput').value = name;
    document.getElementById('teacherPinInput').value = pin;
    teacherLoginAttempt();
  }
})();

// ══════════════════════════════════════════════════════════
// 📊 대시보드 데이터 (기존 GAS_WEB_APP_URL — 읽기 전용으로만 사용)
// ══════════════════════════════════════════════════════════
async function loadDashboard(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='⏳ 불러오는 중...';
  try{
    const json = await fetchJson(GAS_WEB_APP_URL);
    if(json.result!=='ok') throw new Error(json.message||'데이터를 불러오지 못했습니다.');
    dashboardData = buildFilteredDashboardData(json.data.rows||[], teacherPermissions);
    renderAll();
    updateMitosisTabVisibility();
    document.getElementById('loadingNote').style.display='none';
    document.getElementById('dashboardContent').style.display='block';
    document.getElementById('lastUpdated').textContent = '마지막 갱신: ' + new Date().toLocaleString('ko-KR');
    loadMitosisData();
  }catch(err){
    document.getElementById('loadingNote').innerHTML = `⚠ 데이터를 불러오지 못했습니다.<br><span style="font-size:12px;">${err.message}</span>`;
    document.getElementById('loadingNote').style.display='block';
  }finally{
    btn.disabled=false; btn.textContent='↻ 새로고침';
  }
}

// 교사 권한(활동명+학급 조합)에 맞춰 rows를 걸러내고 집계를 재계산합니다.
function buildFilteredDashboardData(rows, permissions){
  const allowed = (permissions||[]).map(p => `${p.activity}||${p.cls}`);
  const filteredRows = (rows||[]).filter(r => allowed.includes(`${r.activity}||${r.cls}`));

  const byActivityMap = {}, byClassMap = {}, byClassActivityMap = {}, byStudentMap = {};
  const studentSet = new Set();

  filteredRows.forEach(r => {
    if(!byActivityMap[r.activity]) byActivityMap[r.activity] = {activity:r.activity, count:0, descSum:0, descN:0, satSum:0, satN:0, lastTimestamp:''};
    const a = byActivityMap[r.activity];
    a.count++;
    if(r.descPct!=null){ a.descSum += Number(r.descPct); a.descN++; }
    if(r.satisfaction!=null){ a.satSum += Number(r.satisfaction); a.satN++; }
    if(r.timestamp && (!a.lastTimestamp || String(r.timestamp) > String(a.lastTimestamp))) a.lastTimestamp = r.timestamp;

    if(!byClassMap[r.cls]) byClassMap[r.cls] = {cls:r.cls, count:0, students:new Set(), activities:new Set(), descSum:0, descN:0, satSum:0, satN:0};
    const c = byClassMap[r.cls];
    c.count++;
    c.students.add(`${r.grade}-${r.cls}-${r.number}-${r.name}`);
    c.activities.add(r.activity);
    if(r.descPct!=null){ c.descSum += Number(r.descPct); c.descN++; }
    if(r.satisfaction!=null){ c.satSum += Number(r.satisfaction); c.satN++; }

    const caKey = `${r.cls}||${r.activity}`;
    if(!byClassActivityMap[caKey]) byClassActivityMap[caKey] = {cls:r.cls, activity:r.activity, count:0, students:new Set(), descSum:0, descN:0, satSum:0, satN:0};
    const ca = byClassActivityMap[caKey];
    ca.count++;
    ca.students.add(`${r.grade}-${r.cls}-${r.number}-${r.name}`);
    if(r.descPct!=null){ ca.descSum += Number(r.descPct); ca.descN++; }
    if(r.satisfaction!=null){ ca.satSum += Number(r.satisfaction); ca.satN++; }

    const sKey = `${r.grade}-${r.cls}-${r.number}-${r.name}`;
    studentSet.add(sKey);
    if(!byStudentMap[sKey]) byStudentMap[sKey] = {grade:r.grade, cls:r.cls, number:r.number, name:r.name, activities:new Set(), descSum:0, descN:0, satSum:0, satN:0, lastTimestamp:''};
    const s = byStudentMap[sKey];
    s.activities.add(r.activity);
    if(r.descPct!=null){ s.descSum += Number(r.descPct); s.descN++; }
    if(r.satisfaction!=null){ s.satSum += Number(r.satisfaction); s.satN++; }
    if(r.timestamp && (!s.lastTimestamp || String(r.timestamp) > String(s.lastTimestamp))) s.lastTimestamp = r.timestamp;
  });

  const round1 = n => Math.round(n*10)/10;
  const byActivity = Object.values(byActivityMap).map(a => ({
    activity:a.activity, count:a.count,
    avgDesc: a.descN ? round1(a.descSum/a.descN) : null,
    avgSatisfaction: a.satN ? round1(a.satSum/a.satN) : null,
    lastTimestamp: a.lastTimestamp
  }));
  const byClass = Object.values(byClassMap).map(c => ({
    cls:c.cls, count:c.count, students:c.students.size, activities:c.activities.size,
    avgDesc: c.descN ? round1(c.descSum/c.descN) : null,
    avgSatisfaction: c.satN ? round1(c.satSum/c.satN) : null
  }));
  const byClassActivity = Object.values(byClassActivityMap).map(ca => ({
    cls:ca.cls, activity:ca.activity, count:ca.count, students:ca.students.size,
    avgDesc: ca.descN ? round1(ca.descSum/ca.descN) : null,
    avgSatisfaction: ca.satN ? round1(ca.satSum/ca.satN) : null
  }));
  const byStudent = Object.values(byStudentMap).map(s => ({
    grade:s.grade, cls:s.cls, number:s.number, name:s.name,
    activities: Array.from(s.activities), activityCount: s.activities.size,
    avgDesc: s.descN ? round1(s.descSum/s.descN) : null,
    avgSatisfaction: s.satN ? round1(s.satSum/s.satN) : null,
    lastTimestamp: s.lastTimestamp
  }));

  const descAll = filteredRows.filter(r=>r.descPct!=null).map(r=>Number(r.descPct));
  const satAll = filteredRows.filter(r=>r.satisfaction!=null).map(r=>Number(r.satisfaction));
  const overall = {
    totalSubmissions: filteredRows.length,
    uniqueStudents: studentSet.size,
    uniqueActivities: byActivity.length,
    avgDesc: descAll.length ? round1(descAll.reduce((a,b)=>a+b,0)/descAll.length) : null,
    avgSatisfaction: satAll.length ? round1(satAll.reduce((a,b)=>a+b,0)/satAll.length) : null
  };

  return {overall, byActivity, byClass, byClassActivity, byStudent, rows: filteredRows};
}

// 🔬 체세포분열 관찰 (권한 있는 반만 필터링, 읽기 전용)
// ══════════════════════════════════════════════════════════
const MITOSIS_STAGES = ['간기', '전기', '중기', '후기', '말기'];

function updateMitosisTabVisibility(){
  const btn = document.getElementById('mitosisTabBtn');
  const hasPerm = teacherPermissions.some(p => p.activity === MITOSIS_ACTIVITY_NAME);
  btn.style.display = hasPerm ? '' : 'none';
}

function loadMitosisData(){
  const hasPerm = teacherPermissions.some(p => p.activity === MITOSIS_ACTIVITY_NAME);
  if(!hasPerm) return;
  const allowedClasses = teacherPermissions.filter(p => p.activity === MITOSIS_ACTIVITY_NAME).map(p => String(p.cls));
  document.getElementById('mitosis-status').innerText = '불러오는 중...';
  fetch(`${GAS_WEB_APP_URL}?action=list`)
    .then(res => res.json())
    .then(data => {
      if(data.result === 'success'){
        let rows = data.rows.reverse();
        rows = rows.filter(r => allowedClasses.includes(`${r['학년']}학년 ${r['반']}반`) || allowedClasses.includes(String(r['반'])));
        mitosisAllRows = rows;
        document.getElementById('mitosis-status').innerText = '';
        populateMitosisClassFilter();
        renderMitosisRows();
      } else {
        document.getElementById('mitosis-status').innerHTML = '<span style="color:var(--coral);">불러오기 실패: ' + data.message + '</span>';
      }
    })
    .catch(() => {
      document.getElementById('mitosis-status').innerHTML = '<span style="color:var(--coral);">⚠ 서버에 연결할 수 없습니다.</span>';
    });
}

function mitosisFormatDate(v){
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d)) return v;
  return d.toLocaleString('ko-KR');
}
function mitosisFileId(url){
  if(!url) return '';
  let m = String(url).match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  m = String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  return '';
}
function mitosisToThumb(url){
  const id = mitosisFileId(url);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w500` : url;
}
function mitosisClassKey(r){ return `${r['학년'] || ''}학년 ${r['반'] || ''}반`; }

function populateMitosisClassFilter(){
  const select = document.getElementById('filter-class');
  const current = select.value;
  const keys = Array.from(new Set(mitosisAllRows.map(mitosisClassKey))).sort();
  select.innerHTML = '<option value="">전체 반</option>' + keys.map(k => `<option value="${k}">${k}</option>`).join('');
  if(keys.includes(current)) select.value = current;
}

function renderMitosisRows(){
  if(!document.getElementById('filter-text')) return;
  const text = document.getElementById('filter-text').value.trim().toLowerCase();
  const cls = document.getElementById('filter-class').value;
  const filtered = mitosisAllRows.filter(r => {
    const matchText = !text || String(r['이름']).toLowerCase().includes(text);
    const matchClass = !cls || mitosisClassKey(r) === cls;
    return matchText && matchClass;
  });
  document.getElementById('mitosis-count-label').innerText = `총 ${filtered.length}건`;

  const container = document.getElementById('mitosis-rows-container');
  if(filtered.length === 0){
    container.innerHTML = '<div class="empty-note">권한이 부여된 반의 제출 자료가 없습니다.</div>';
    return;
  }

  const groups = {};
  filtered.forEach(r => {
    const key = mitosisClassKey(r);
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const groupKeys = Object.keys(groups).sort();
  groupKeys.forEach(k => groups[k].sort((a,b) => Number(a['번호']) - Number(b['번호'])));

  container.innerHTML = groupKeys.map(key => `
    <div style="margin-bottom:32px;">
      <h2 style="font-size:16px;font-weight:800;color:#374151;margin-bottom:12px;padding-left:12px;border-left:4px solid var(--teal);">
        ${key} <span style="font-size:13px;font-weight:400;color:var(--muted);">(${groups[key].length}건)</span>
      </h2>
      <div style="display:flex;flex-direction:column;gap:16px;">
        ${groups[key].map(r => `
          <div style="background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.1);border:1px solid var(--line);padding:20px;">
            <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);gap:8px;">
              <div style="font-weight:700;font-size:16px;">${r['번호']}번 ${r['이름']}</div>
              <div style="font-size:11px;padding:3px 10px;border-radius:20px;background:var(--teal-soft);color:var(--teal);">${r['모드'] || ''}</div>
              <div style="font-size:11px;color:var(--muted);">${mitosisFormatDate(r['제출시각'])}</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
              <style>@media(min-width:640px){.mit-grid{grid-template-columns:repeat(5,1fr)!important;}}</style>
              ${MITOSIS_STAGES.map(s => `
                <div style="text-align:center;">
                  <div style="font-weight:700;font-size:13px;margin-bottom:4px;">${s}</div>
                  ${r[s+'_사진'] ? `<a href="${r[s+'_사진']}" target="_blank"><img src="${mitosisToThumb(r[s+'_사진'])}" loading="lazy" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--line);"></a>` : '<div style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#fafbfa;border-radius:8px;border:1px solid var(--line);font-size:11px;color:var(--muted);">사진 없음</div>'}
                  <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:left;max-height:56px;overflow-y:auto;">${r[s+'_관찰'] || ''}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}
</script>
